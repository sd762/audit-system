        // --- 報表表格 ---
        const ReportTable = ({ title, data, onManualScoreChange, onHideItem, onRestoreItem, onAnalysisTextChange, onFrequencyChange }) => (
            <div className="bg-white p-6 rounded-3xl border shadow-sm overflow-hidden mb-6">

                                <button key={row.id} onClick={() => onRestoreItem(row.id)} className="text-[10px] bg-slate-100 hover:bg-blue-100 text-slate-600 px-3 py-1 rounded-full flex items-center gap-1 border">

        );

        const normalizeDate = (val) => {
            if (!val) return '';
            if (/^\d{4}-\d{2}-\d{2}$/.test(String(val))) return String(val);
            let str = String(val).trim().replace(/[\/\.]/g, '-');
            const parts = str.split('-');
            if (parts.length === 3) {
                let [y, m, d] = parts;
                if (Number(y) < 1000) y = String(Number(y) + 1911);
                return `${y}-${m.padStart(2, '0')}-${d.padStart(2, '0')}`;
            }
            return str;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('form');
            const [records, setRecords] = useState(() => Storage.getRecords());
            const [reportSettings, setReportSettings] = useState(() => Storage.getSettings());
            const [dialog, setDialog] = useState({ isOpen: false, type: 'alert', title: '', message: '', onConfirm: null });
            const [filterMonth, setFilterMonth] = useState('');
            const [filterItem, setFilterItem] = useState('');
            const [selectedIds, setSelectedIds] = useState(new Set());
            const [expandedFolders, setExpandedFolders] = useState(new Set());
            const [filterTplMainCat, setFilterTplMainCat] = useState('照護品質類技術考');
            const [filterTplSubCat, setFilterTplSubCat] = useState('護理照服類');
            const [currentTemplateId, setCurrentTemplateId] = useState('');
            const [formData, setFormData] = useState({ date: new Date().toISOString().split('T')[0], auditor: '', unit: '', target: '', score: '', score2: '', notes: '', auditName: '一般綜合稽核', isDual: false, technique: '' });
            const [checklist, setChecklist] = useState([]);

            const availableYears = useMemo(() => {
                const years = [...new Set(records.map(r => String(r?.date || '').substring(0, 4)))].filter(y => y.length === 4).sort().reverse();
                return years.length > 0 ? years : [new Date().getFullYear().toString()];
            }, [records]);
            const [selectedYear, setSelectedYear] = useState(availableYears[0] || new Date().getFullYear().toString());

            const [templates, setTemplates] = useState(() => {
                const saved = Storage.getTemplates();
                // V1.4: 強制刷新緩存修復毀損結構
                const isMigrated = localStorage.getItem('tpl_migrated_v20');
                if (!isMigrated) {
                    const uniqueSaved = saved.filter(s => !DEFAULT_TEMPLATES.some(d => d.id === s.id));
                    const merged = [...DEFAULT_TEMPLATES, ...uniqueSaved];
                    localStorage.setItem('tpl_migrated_v20', 'true');
                    Storage.saveTemplates(merged);
                    return merged;
                }
                return saved;
            });

            useEffect(() => { Storage.saveRecords(records); }, [records]);
            useEffect(() => { Storage.saveTemplates(templates); }, [templates]);
            useEffect(() => { Storage.saveSettings(reportSettings); }, [reportSettings]);

            useEffect(() => {
                if (checklist.length > 0) {
                    if (formData.isDual) {
                        const total = checklist.length;
                        const washedCount = checklist.filter(i => i.comp === 'dry' || i.comp === 'wet').length;
                        const correctCount = checklist.filter(i => (i.comp === 'dry' || i.comp === 'wet') && i.acc === 'yes').length;
                        setFormData(p => ({ ...p, score: total > 0 ? Math.round((washedCount / total) * 100) : 0, score2: washedCount > 0 ? Math.round((correctCount / washedCount) * 100) : 0 }));
                    } else {
                        const validItems = checklist.filter(i => i.score !== '');
                        const totalMax = validItems.reduce((a, c) => a + (c.maxScore || 0), 0);
                        const totalCur = validItems.reduce((a, c) => a + Number(c.score || 0), 0);
                        setFormData(p => ({ ...p, score: totalMax > 0 ? Math.round((totalCur / totalMax) * 100) : 0 }));
                    }
                }
            }, [checklist, formData.isDual]);

            // 防呆防錯機制的表格建立邏輯
            const buildTableData = useCallback((categoryName) => {
                const hiddenItems = reportSettings.hiddenItems || [];
                const manualScores = reportSettings.manualScores || {};
                const analysisTexts = reportSettings.analysisTexts || {};
                const customFreqs = reportSettings.customFrequencies || {};

                const allItems = templates.filter(t => t.mainCategory === categoryName).map(tpl => {
                    const yearRecords = records.filter(r => r && String(r.date || '').startsWith(selectedYear) && String(r.auditName || '').includes(tpl.name));
                    const mAvgs = Array(13).fill('');
                    let sum = 0, sum2 = 0, count = 0;
                    
                    if (tpl.isDual) {
                        const monthsC = Array(13).fill(0), monthsA = Array(13).fill(0), monthsCnt = Array(13).fill(0);
                        yearRecords.forEach(r => {
                            const m = parseInt(String(r.date || '').split('-')[1]);
                            if (m) { monthsC[m] += Number(r.score || 0); monthsA[m] += Number(r.score2 || 0); monthsCnt[m]++; }
                        });
                        for (let m = 1; m <= 12; m++) {
                            const key = `${selectedYear}_${tpl.id}_${m}`;
                            if (manualScores[key]) { 
                                mAvgs[m] = String(manualScores[key]); 
                                const p = String(manualScores[key]).split('/'); 
                                if(p[1]) { sum += Number(p[0]||0); sum2 += Number(p[1]||0); count++; } 
                            }
                            else if (monthsCnt[m] > 0) { 
                                const c = Math.round(monthsC[m]/monthsCnt[m]), a = Math.round(monthsA[m]/monthsCnt[m]); 
                                mAvgs[m] = `${c}/${a}`; sum+=c; sum2+=a; count++; 
                            }
                        }
                    } else {
                        const monthsS = Array(13).fill(0), monthsCnt = Array(13).fill(0);
                        yearRecords.forEach(r => { const m = parseInt(String(r.date || '').split('-')[1]); if (m) { monthsS[m] += Number(r.score || 0); monthsCnt[m]++; } });
                        for (let m = 1; m <= 12; m++) {
                            const key = `${selectedYear}_${tpl.id}_${m}`;
                            if (manualScores[key]) { const v = Number(manualScores[key]); mAvgs[m] = v; sum += v; count++; }
                            else if (monthsCnt[m] > 0) { const v = Math.round(monthsS[m]/monthsCnt[m]); mAvgs[m] = v; sum += v; count++; }
                        }
                    }
                    const avgStr = count > 0 ? (tpl.isDual ? `${Math.round(sum/count)}/${Math.round(sum2/count)}` : Math.round(sum/count)) : '-';
                    return { 
                        id: tpl.id, itemName: tpl.name, targetStaff: tpl.targetStaff || '-', responsible: tpl.responsible || '-', 
                        frequency: customFreqs[tpl.id] !== undefined ? customFreqs[tpl.id] : (tpl.frequency || '-'), 
                        schedule: tpl.schedule || [], threshold: tpl.threshold || 90, isDual: !!tpl.isDual, 
                        mAvgs, avg: avgStr, analysisText: analysisTexts[`${selectedYear}_${tpl.id}`] || '', isHidden: hiddenItems.includes(tpl.id) 
                    };
                });
                return { visible: allItems.filter(i => !i.isHidden), hidden: allItems.filter(i => i.isHidden) };
            }, [records, selectedYear, templates, reportSettings]);

            const careReportData = useMemo(() => buildTableData('照護品質類技術考'), [buildTableData]);
            const equipReportData = useMemo(() => buildTableData('儀器操作類技術考'), [buildTableData]);

            const showAlert = (message, title = '系統提示') => setDialog({ isOpen: true, type: 'alert', title, message, onConfirm: null });
            const showConfirm = (message, onConfirm, title = '⚠️ 確認操作') => setDialog({ isOpen: true, type: 'confirm', title, message, onConfirm });

            const handleManualScoreChange = (tplId, month, value, isDual) => {
                const key = `${selectedYear}_${tplId}_${month}`;
                setReportSettings(p => { const n = { ...(p.manualScores || {}) }; if (value === '') delete n[key]; else n[key] = value; return { ...p, manualScores: n }; });
            };
            const handleFrequencyChange = (tplId, value) => {
                setReportSettings(p => { const n = { ...(p.customFrequencies || {}) }; if (value === '') delete n[tplId]; else n[tplId] = value; return { ...p, customFrequencies: n }; });
            };
            const handleAnalysisTextChange = (tplId, value) => {
                const key = `${selectedYear}_${tplId}`;
                setReportSettings(p => { const n = { ...(p.analysisTexts || {}) }; if (value === '') delete n[key]; else n[key] = value; return { ...p, analysisTexts: n }; });
            };
            const handleHideItem = (tplId) => setReportSettings(p => ({ ...p, hiddenItems: [...(p.hiddenItems || []), tplId] }));
            const handleRestoreItem = (tplId) => setReportSettings(p => ({ ...p, hiddenItems: (p.hiddenItems || []).filter(id => id !== tplId) }));

            const handleTplFilterChange = (type, value) => {
                if (type === 'main') setFilterTplMainCat(value);
                if (type === 'sub') setFilterTplSubCat(value);
                setCurrentTemplateId(''); setChecklist([]);
                setFormData(p => ({ ...p, auditName: '一般綜合稽核', score: '', score2: '', isDual: false, technique: '' }));
            };

            const availableTemplates = useMemo(() => templates.filter(t => (filterTplMainCat ? t.mainCategory === filterTplMainCat : true) && (filterTplSubCat ? t.subCategory === filterTplSubCat : true)), [templates, filterTplMainCat, filterTplSubCat]);

            const handleDualScoreChange = (idx, field, value) => {
                const nl = [...checklist]; nl[idx][field] = value;
                if (field === 'comp' && value === 'none') nl[idx].acc = null;
                setChecklist(nl);
            };

            // 🌟 核心：嚴格對齊 CSV 的手部衛生匯出邏輯
            const handleExportExcel = () => {
                let targets = selectedIds.size > 0 ? records.filter(r => r && selectedIds.has(r.id)) : flatFilteredRecords;
                if (targets.length === 0) return showAlert('沒有資料可匯出！');

                const isHandHygieneReport = targets.every(r => String(r.auditName || '').includes('洗手遵從性及正確性'));

                if (isHandHygieneReport) {
                    let monthStr = filterMonth ? filterMonth.replace('-', '年 ') + '月' : '全部月份';
                    const wsData = [
                        ['新北市清福護理之家', '', '', '', '', '', '', '', '', '', '', '', '', ''],
                        [`手部衛生遵從率及正確率內部稽核 ${monthStr}`, '', '', '', '', '', '', '', '', '', '', '', '', ''],
                        ['機構內部\n稽核人員', '', '洗手機會數(T)', '手部衛生/步驟', '', '', '', '時機數（觀察次數）統計', '', '', '', '', '手部衛生\n遵從率', '手部衛生\n正確率'],
                        ['', '', '', '執行乾洗手次數(A)', '乾洗手步驟確實次數(B)', '執行濕洗手次數(C)', '濕洗手步驟確實次數(D)', '時機一', '時機二', '時機三', '時機四', '時機五', '', ''],
                        ['', '', '', '', '', '', '', '接觸病人前', '執行清潔/無菌操作技術前', '暴處病人體液風險後', '接觸病人後', '接觸病人週遭環境後', '', '']
                    ];

                    targets.forEach(r => {
                        let A = 0, B = 0, C = 0, D = 0, t1 = 0, t2 = 0, t3 = 0, t4 = 0, t5 = 0;
                        (r.checklist || []).forEach(item => {
                            if (item.comp === 'dry') { A++; if (item.acc === 'yes') B++; }
                            if (item.comp === 'wet') { C++; if (item.acc === 'yes') D++; }
                            const n = String(item.name || '');
                            if (n.includes('時機一')) t1++; if (n.includes('時機二')) t2++;
                            if (n.includes('時機三')) t3++; if (n.includes('時機四')) t4++;
                            if (n.includes('時機五')) t5++;
                        });
                        const rawAuditName = String(r.auditName || '');
                        const parsedTech = rawAuditName.includes('(') ? '(' + rawAuditName.split('(')[1] : '(其他)';
                        wsData.push([r.target || '未命名', parsedTech, r.checklist.length, A, B, C, D, t1, t2, t3, t4, t5, r.score || 0, r.score2 || 0]);
                    });

                    const ws = window.XLSX.utils.aoa_to_sheet(wsData);
                    ws['!merges'] = [
                        {s:{r:0,c:0}, e:{r:0,c:13}}, {s:{r:1,c:0}, e:{r:1,c:13}}, {s:{r:2,c:0}, e:{r:4,c:0}}, 
                        {s:{r:2,c:2}, e:{r:4,c:2}}, {s:{r:2,c:3}, e:{r:2,c:6}}, {s:{r:2,c:7}, e:{r:2,c:11}}, 
                        {s:{r:2,c:12}, e:{r:4,c:12}}, {s:{r:2,c:13}, e:{r:4,c:13}}
                    ];
                    const wb = window.XLSX.utils.book_new();
                    window.XLSX.utils.book_append_sheet(wb, ws, "統計報表");
                    window.XLSX.writeFile(wb, `手部衛生統計_${monthStr}.xlsx`);
                } else {
                    const ws = window.XLSX.utils.json_to_sheet(targets.map(r => ({'日期': r.date, '稽核項目': r.auditName, '受測對象': r.target, '總評分': r.score})));
                    const wb = window.XLSX.utils.book_new();
                    window.XLSX.utils.book_append_sheet(wb, ws, "稽核紀錄");
                    window.XLSX.writeFile(wb, `技術考稽核報表.xlsx`);
                }
            };

            const handleTemplateUpload = (e) => {
                const file = e.target.files[0]; if (!file) return;
                const fileExt = file.name.split('.').pop().toLowerCase();
                const fileNameWithoutExt = file.name.replace(/\.[^/.]+$/, "");
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    const arrayBuffer = ev.target.result;
                    let items = [];
                    try {
                        if (fileExt === 'docx') {
                            const result = await window.mammoth.convertToHtml({ arrayBuffer });
                            const doc = new DOMParser().parseFromString(result.value, 'text/html');
                            doc.querySelectorAll('tr').forEach(tr => {
                                const cells = Array.from(tr.querySelectorAll('td, th')).map(c => c.textContent.trim());
                                const name = cells[0];
                                const scoreMatch = cells[1] && cells[1].match(/\d+/);
                                if (name && scoreMatch) items.push({ id: Math.random().toString(36).substr(2,9), name, maxScore: Number(scoreMatch[0]), score: Number(scoreMatch[0]), note: '', mode: 'full' });
                            });
                        } else if (fileExt === 'xlsx' || fileExt === 'xls') {
                            const wb = window.XLSX.read(new Uint8Array(arrayBuffer), { type: 'array' });
                            const rows = window.XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 });
                            rows.forEach(row => {
                                const name = String(row[0] || '');
                                const scoreMatch = String(row[1] || '').match(/\d+/);
                                if (name && scoreMatch) items.push({ id: Math.random().toString(36).substr(2,9), name, maxScore: Number(scoreMatch[0]), score: Number(scoreMatch[0]), note: '', mode: 'full' });
                            });
                        }
                        if (items.length > 0) {
                            const newTplId = 'tpl_' + Date.now().toString();
                            setTemplates(prev => [...prev, {
                                id: newTplId, name: fileNameWithoutExt, mainCategory: filterTplMainCat, subCategory: filterTplSubCat,
                                targetStaff: '-', responsible: '-', frequency: '-', schedule: [], threshold: 90, isDual: false, items: items
                            }]);
                            setCurrentTemplateId(newTplId); setChecklist(items);
                            setFormData(p => ({ ...p, auditName: fileNameWithoutExt, isDual: false }));
                            showAlert(`✅ 成功匯入「${fileNameWithoutExt}」！`);
                        } else showAlert('⚠️ 未能辨識評分細項，請確認格式。');
                    } catch (err) { showAlert('解析發生錯誤。'); }
                    e.target.value = '';
                };
                reader.readAsArrayBuffer(file);
            };

            const handleScoreModeChange = (idx, mode, score) => {
                const nl = [...checklist]; nl[idx].mode = mode; nl[idx].score = score; setChecklist(nl);
            };
            const handleScoreValueChange = (idx, val) => {
                const nl = [...checklist]; const item = nl[idx];
                if (val === '') item.score = '';
                else { let num = Number(val); item.score = num > item.maxScore ? item.maxScore : (num < 0 ? 0 : val); }
                setChecklist(nl);
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!formData.target) return showAlert('請輸入受測對象姓名！');
                if (formData.score === '') return showAlert('尚有計分未完成！');
                if (formData.isDual && !formData.technique) return showAlert('請選擇對應的護理技術項目！');
                if (formData.isDual && checklist.length === 0) return showAlert('至少需新增一個洗手時機！');
                
                const finalAuditName = formData.isDual ? `${formData.auditName} (${formData.technique})` : formData.auditName;
                const newRec = { ...formData, auditName: finalAuditName, id: Date.now().toString() + Math.random().toString(36).substr(2, 5), checklist };
                setRecords(prev => [newRec, ...prev]);
                
                setFormData(p => ({ ...p, target: '', score: '', score2: '', notes: '' }));
                if (formData.isDual) setChecklist(checklist.map(i => ({ ...i, comp: null, acc: null, note: '' })));
                else setChecklist(checklist.map(i => ({ ...i, score: i.maxScore, note: '', mode: 'full' })));
                showAlert('💾 紀錄已儲存！');
            };

            const handleReverseImport = (e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const wb = window.XLSX.read(new Uint8Array(ev.target.result), { type: 'array' });
                        const data = window.XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { raw: true, defval: '' });
                        const validData = data.filter(row => row['稽核人員'] !== '平均總分' && (row['稽核日期'] || row['日期']));
                        const imported = validData.map((row, index) => {
                            const isDualItem = String(row['稽核項目'] || '').includes('洗手遵從性及正確性');
                            return {
                                id: 'import_' + Date.now().toString() + '_' + index, 
                                date: normalizeDate(row['稽核日期'] || row['日期']), 
                                auditName: String(row['稽核項目'] || row['項目']),
                                unit: String(row['受稽單位'] || row['單位']), 
                                target: String(row['受測對象(姓名)'] || row['受測對象']),
                                auditor: String(row['稽核人員'] || row['稽核員']), 
                                score: Number(row['總評分(遵從率)'] || row['總評分'] || 0), 
                                score2: isDualItem ? Number(row['總評分(正確率)'] || 0) : '',
                                isDual: isDualItem, notes: String(row['總結建議'] || ''), checklist: []
                            };
                        });
                        setRecords(prev => [...imported, ...prev]);
                        showAlert(`✅ 成功匯入 ${imported.length} 筆資料！`);
                    } catch (err) { showAlert('匯入失敗。'); }
                    e.target.value = '';
                };
                reader.readAsArrayBuffer(file);
            };

            // 安全防護層：過濾掉壞損紀錄
            const flatFilteredRecords = useMemo(() => {
                return records.filter(r => r && (filterMonth ? String(r.date || '').startsWith(filterMonth) : true) && (filterItem ? String(r.auditName || '') === filterItem : true));
            }, [records, filterMonth, filterItem]);

            const groupedRecords = useMemo(() => {
                const groups = {};
                flatFilteredRecords.forEach(r => {
                    const m = String(r.date || '').substring(0, 7) || '未知月份';
                    const it = String(r.auditName || '未命名項目');
                    if(!groups[m]) groups[m] = { items: {}, totalCount: 0 };
                    if(!groups[m].items[it]) groups[m].items[it] = [];
                    groups[m].items[it].push(r);
                    groups[m].totalCount++;
                });
                return Object.keys(groups).sort().reverse().reduce((acc, key) => { acc[key] = groups[key]; return acc; }, {});
            }, [flatFilteredRecords]);

            const uniqueMonths = useMemo(() => [...new Set(records.map(r => String(r?.date || '').substring(0, 7)))].sort().reverse(), [records]);
            const uniqueItems = useMemo(() => [...new Set(records.map(r => String(r?.auditName || '')))].filter(Boolean).sort(), [records]);

            const toggleFolder = (folderId) => {
                setExpandedFolders(prev => { const next = new Set(prev); if (next.has(folderId)) next.delete(folderId); else next.add(folderId); return next; });
            };

            const handleToggleSelect = (id) => {
                const newIds = new Set(selectedIds); if (newIds.has(id)) newIds.delete(id); else newIds.add(id); setSelectedIds(newIds);
            };

            const handleSelectAll = (e) => {
                const newIds = new Set(); if (e.target.checked) flatFilteredRecords.forEach(r => newIds.add(r.id)); setSelectedIds(newIds);
            };

            const handleToggleFolderSelect = (e, recsToToggle) => {
                e.stopPropagation();
                const isAllSelected = recsToToggle.every(r => selectedIds.has(r.id));
                const newIds = new Set(selectedIds);
                if (isAllSelected) recsToToggle.forEach(r => newIds.delete(r.id)); else recsToToggle.forEach(r => newIds.add(r.id));
                setSelectedIds(newIds);
            };

            const handleBatchDelete = () => {
                if (selectedIds.size === 0) return showAlert('請先勾選資料！');
                showConfirm(`確定要刪除選取的 ${selectedIds.size} 筆資料？`, () => {
                    setRecords(prev => prev.filter(r => !selectedIds.has(r.id))); setSelectedIds(new Set());
                });
            };

            const handleExportChartExcel = () => {
                const formatData = (data) => data.visible.map(row => {
                    const out = { '品管項目': row.itemName, '被稽核人員': row.targetStaff, '負責人': row.responsible, '監測頻率': row.frequency, '閾值(%)': row.threshold };
                    for (let m = 1; m <= 12; m++) out[`${m}月`] = row.mAvgs[m] || '';
                    out['年平均'] = row.avg !== '-' ? row.avg : '';
                    out['檢討改善分析'] = row.analysisText || '';
                    return out;
                });
                const wb = window.XLSX.utils.book_new();
                window.XLSX.utils.book_append_sheet(wb, window.XLSX.utils.json_to_sheet(formatData(careReportData)), "照護品質監測");
                window.XLSX.utils.book_append_sheet(wb, window.XLSX.utils.json_to_sheet(formatData(equipReportData)), "儀器操作監測");
                window.XLSX.writeFile(wb, `${selectedYear}年度_稽核分析總表.xlsx`);
            };

            return (
                <div className="min-h-screen flex flex-col bg-slate-50 text-slate-800">
                    <nav className="bg-primary text-white p-4 shadow-lg sticky top-0 z-50 flex justify-between items-center">
                        <div className="flex flex-col"><h1 className="font-bold text-lg tracking-tight">清福技術考稽核系統</h1><span className="text-[9px] bg-white/20 px-2 py-0.5 rounded self-start uppercase">V1.4 彈性擴充防呆版</span></div>
                    </nav>

                    <main className="max-w-7xl mx-auto w-full p-4 flex-1">
                        <div className="flex flex-wrap sm:flex-nowrap gap-1 mb-6 bg-white p-1 rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                            <button onClick={() => setActiveTab('form')} className={`flex-1 min-w-[80px] py-3 rounded-lg font-bold flex flex-col sm:flex-row items-center justify-center gap-1 sm:gap-2 transition-all ${activeTab === 'form' ? 'bg-primary text-white shadow-lg' : 'text-slate-400 hover:bg-slate-50'}`}><IconForm /> 現場考評</button>
                            <button onClick={() => setActiveTab('history')} className={`flex-1 min-w-[80px] py-3 rounded-lg font-bold flex flex-col sm:flex-row items-center justify-center gap-1 sm:gap-2 transition-all ${activeTab === 'history' ? 'bg-primary text-white shadow-lg' : 'text-slate-400 hover:bg-slate-50'}`}><IconHistory /> 紀錄庫</button>
                            <button onClick={() => setActiveTab('chart')} className={`flex-1 min-w-[80px] py-3 rounded-lg font-bold flex flex-col sm:flex-row items-center justify-center gap-1 sm:gap-2 transition-all ${activeTab === 'chart' ? 'bg-primary text-white shadow-lg' : 'text-slate-400 hover:bg-slate-50'}`}><IconChart /> 分析報表</button>
                            <button onClick={() => setActiveTab('manual')} className={`flex-1 min-w-[80px] py-3 rounded-lg font-bold flex flex-col sm:flex-row items-center justify-center gap-1 sm:gap-2 transition-all ${activeTab === 'manual' ? 'bg-teal-600 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-50'}`}><IconManual /> 使用手冊</button>
                        </div>

                        {activeTab === 'form' && (
                            <div className="animate-fade-in space-y-6">
                                <div className="bg-white p-6 rounded-xl border shadow-sm">
                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-6">
                                        <div className="bg-blue-50 p-4 rounded-lg flex flex-col gap-3">
                                            <label className="text-[10px] font-bold text-blue-600 uppercase border-b border-blue-200 pb-1">📚 選擇稽核標準題庫</label>
                                            <div className="flex gap-2">
                                                <select value={filterTplMainCat} onChange={e => handleTplFilterChange('main', e.target.value)} className="flex-1 p-1.5 text-xs border rounded bg-white">{MAIN_CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}</select>
                                                <select value={filterTplSubCat} onChange={e => handleTplFilterChange('sub', e.target.value)} className="flex-1 p-1.5 text-xs border rounded bg-white"><option value="">-- 子類 --</option>{SUB_CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}</select>
                                            </div>
                                            <div className="flex gap-2">
                                                <select value={currentTemplateId} onChange={e => {
                                                    const tid = e.target.value; setCurrentTemplateId(tid); const t = templates.find(x => x.id === tid);
                                                    if (t) { 
                                                        if (t.isDual) {
                                                            setChecklist([]);
                                                            setFormData({...formData, auditName: t.name, isDual: true, score: '', score2: '', technique: ''});
                                                        } else {
                                                            setChecklist(t.items.map(i => ({...i, score: i.maxScore, note: '', mode: 'full'}))); 
                                                            setFormData({...formData, auditName: t.name, isDual: false, score: '', score2: ''}); 
                                                        }
                                                    } else { setChecklist([]); setFormData({...formData, auditName: '一般綜合稽核', score: '', score2: '', isDual: false}); }
                                                }} className="flex-1 p-2 border border-blue-300 rounded-lg bg-white font-bold text-sm">
                                                    <option value="">-- 請選擇稽核項目 --</option>
                                                    {availableTemplates.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
                                                </select>
                                                {currentTemplateId && (
                                                    <button type="button" onClick={() => showConfirm('確定要刪除這份表單？', () => { setTemplates(p => p.filter(t => t.id !== currentTemplateId)); setCurrentTemplateId(''); setChecklist([]); })} className="bg-red-50 text-red-600 px-3 rounded-lg border border-red-200 shrink-0"><IconTrash /></button>
                                                )}
                                                <label className="bg-emerald-50 text-emerald-700 px-3 py-2 rounded-lg border border-emerald-200 cursor-pointer flex items-center gap-1 font-bold text-sm shrink-0">
                                                    <IconImport /> 匯入表單<input type="file" accept=".docx, .xlsx, .xls" onChange={handleTemplateUpload} className="hidden" />
                                                </label>
                                            </div>
                                        </div>
                                        <div className="border-2 border-dashed border-slate-300 rounded-lg p-4 flex flex-col items-center justify-center bg-slate-50/50 text-center">
                                            <p className="text-[10px] text-slate-400">系統已內建全院核心技術考評標準及雙指標特殊表單。<br/>若有新表單需求，請點擊「匯入表單」上傳。</p>
                                        </div>
                                    </div>
                                    <form onSubmit={handleSubmit} className="space-y-4">
                                        <div className="grid grid-cols-2 md:grid-cols-6 gap-3">
                                            <div className="md:col-span-1"><label className="text-[10px] font-bold text-slate-400 uppercase">日期</label><input type="date" value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} className="w-full p-2 border border-slate-200 rounded text-sm" /></div>
                                            <div className="md:col-span-1"><label className="text-[10px] font-bold text-slate-400 uppercase">稽核員</label><input type="text" placeholder="姓名" value={formData.auditor} onChange={e => setFormData({...formData, auditor: e.target.value})} className="w-full p-2 border border-slate-200 rounded text-sm" /></div>
                                            <div className="md:col-span-1"><label className="text-[10px] font-bold text-slate-400 uppercase">單位</label><input type="text" placeholder="單位" value={formData.unit} onChange={e => setFormData({...formData, unit: e.target.value})} className="w-full p-2 border border-slate-200 rounded text-sm" /></div>
                                            <div className="md:col-span-1"><label className="text-[10px] font-bold text-slate-400 uppercase">受測對象</label><input type="text" required placeholder="姓名" value={formData.target} onChange={e => setFormData({...formData, target: e.target.value})} className="w-full p-2 border-2 border-primary rounded text-sm font-bold text-primary" /></div>
                                            
                                            {/* 分數顯示區 */}
                                            {formData.isDual ? (
                                                <>
                                                    <div className="md:col-span-1"><label className="text-[10px] font-bold text-blue-500 uppercase">遵從率 (%)</label><input type="number" readOnly value={formData.score} className="w-full p-2 border rounded text-sm font-black text-center bg-blue-50 text-blue-600 border-blue-200" /></div>
                                                    <div className="md:col-span-1"><label className="text-[10px] font-bold text-teal-500 uppercase">正確性 (%)</label><input type="number" readOnly value={formData.score2} className="w-full p-2 border rounded text-sm font-black text-center bg-teal-50 text-teal-600 border-teal-200" /></div>
                                                </>
                                            ) : (
                                                <div className="md:col-span-2"><label className="text-[10px] font-bold text-slate-400 uppercase">總得分 (%)</label><input type="number" readOnly value={formData.score} className="w-full p-2 border rounded text-sm font-black text-center bg-slate-100 text-primary border-slate-200" /></div>
                                            )}
                                        </div>

                                        {/* 雙指標專屬：技術選擇器 */}
                                        {formData.isDual && (
                                            <div className="bg-blue-100/50 p-4 rounded-xl border border-blue-200 mt-4 animate-fade-in">
                                                <label className="text-xs font-bold text-blue-800 mb-2 block">🩺 請選擇稽核技術項目：</label>
                                                <div className="flex flex-wrap gap-2 mb-3">
                                                    {Object.keys(DUAL_TECHNIQUES).map(tech => (
                                                        <button 
                                                            key={tech} type="button"
                                                            onClick={() => {
                                                                setFormData(p => ({...p, technique: tech}));
                                                                setChecklist(DUAL_TECHNIQUES[tech].map(i => ({...i, comp: null, acc: null, note: '', uniqueId: Date.now() + Math.random()})));
                                                            }}
                                                            className={`px-4 py-2 rounded-lg text-sm font-bold border transition-all ${formData.technique === tech ? 'bg-blue-600 text-white shadow-md border-blue-600' : 'bg-white text-blue-700 border-blue-300 hover:bg-blue-50'}`}
                                                        >
                                                            {tech}
                                                        </button>
                                                    ))}
                                                </div>
                                                {/* 當選擇「其他」時，顯示手動新增時機的選單 */}
                                                {formData.technique === '其他' && (
                                                    <div className="flex gap-2 items-center bg-white p-2 rounded-lg border border-blue-200 shadow-sm">
                                                        <select id="newTimingSelect" className="flex-1 p-2 text-sm border rounded bg-slate-50 outline-none focus:border-blue-400">
                                                            <option value="">-- 選擇要新增的洗手時機 --</option>
                                                            {TIMING_OPTIONS.map(opt => <option key={opt.id} value={opt.id}>{opt.name}</option>)}
                                                        </select>
                                                        <button type="button" onClick={() => {
                                                            const sel = document.getElementById('newTimingSelect');
                                                            if (!sel.value) return;
                                                            const opt = TIMING_OPTIONS.find(o => o.id === sel.value);
                                                            setChecklist(prev => [...prev, { ...opt, uniqueId: Date.now() + Math.random(), comp: null, acc: null, note: '' }]);
                                                            sel.value = '';
                                                        }} className="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow hover:bg-blue-700 transition-colors shrink-0">新增時機</button>
                                                    </div>
                                                )}
                                            </div>
                                        )}

                                        {checklist.length > 0 && (
                                            <div className="space-y-3 max-h-[500px] overflow-y-auto pr-2 custom-scrollbar bg-slate-50/50 p-4 rounded-xl border border-slate-100 shadow-inner mt-4">
                                                <h3 className="text-xs font-bold text-slate-500 uppercase mb-4 flex justify-between items-center">
                                                    <div className="flex items-center gap-3">
                                                        <span>評項明細表</span>
                                                        {String(formData.auditName || '').includes('鼻胃管') && !formData.isDual && <span className="text-[10px] bg-blue-100 text-blue-700 px-2 py-0.5 rounded-md">灌食後住民繼續採半坐臥姿勢</span>}
                                                    </div>
                                                    <span>{formData.isDual ? `${formData.auditName} - ${formData.technique}` : formData.auditName}</span>
                                                </h3>
                                                
                                                {checklist.map((it, idx) => (
                                                    <div key={it.uniqueId || it.id || idx} className="bg-white p-4 rounded-2xl border border-slate-200 flex flex-col gap-3 shadow-sm transition-all hover:shadow-md relative">
                                                        {formData.isDual && formData.technique === '其他' && (
                                                            <button type="button" onClick={() => setChecklist(prev => prev.filter((_, i) => i !== idx))} className="absolute top-4 right-4 text-red-300 hover:text-red-500" title="移除此時機"><IconTrash /></button>
                                                        )}
                                                        {formData.isDual ? (
                                                            // 雙指標 UI
                                                            <div className="flex flex-col gap-3">
                                                                <span className="text-sm font-bold text-slate-800 border-b pb-2 pr-8">{idx+1}. {it.name}</span>
                                                                <div className="flex flex-col sm:flex-row gap-4 bg-slate-50 p-3 rounded-xl border">
                                                                    <div className="flex-1 flex flex-col gap-2">
                                                                        <span className="text-[11px] font-bold text-slate-500 flex items-center gap-1"><IconForm/> 遵從性 (行動)</span>
                                                                        <div className="flex gap-2">
                                                                            <button type="button" onClick={() => handleDualScoreChange(idx, 'comp', 'dry')} className={`flex-1 py-2 text-xs font-bold rounded-lg border transition-all ${it.comp === 'dry' ? 'bg-blue-600 text-white border-blue-600 shadow' : 'bg-white text-slate-600 hover:bg-slate-100'}`}>乾洗手</button>
                                                                            <button type="button" onClick={() => handleDualScoreChange(idx, 'comp', 'wet')} className={`flex-1 py-2 text-xs font-bold rounded-lg border transition-all ${it.comp === 'wet' ? 'bg-blue-600 text-white border-blue-600 shadow' : 'bg-white text-slate-600 hover:bg-slate-100'}`}>濕洗手</button>
                                                                            <button type="button" onClick={() => handleDualScoreChange(idx, 'comp', 'none')} className={`flex-1 py-2 text-xs font-bold rounded-lg border transition-all ${it.comp === 'none' ? 'bg-red-500 text-white border-red-500 shadow' : 'bg-white text-slate-600 hover:bg-slate-100'}`}>沒洗手</button>
                                                                        </div>
                                                                    </div>
                                                                    <div className="flex-1 flex flex-col gap-2">
                                                                        <span className="text-[11px] font-bold text-slate-500 flex items-center gap-1">✨ 正確性 (步驟)</span>
                                                                        <div className="flex gap-2">
                                                                            <button type="button" disabled={it.comp === 'none' || !it.comp} onClick={() => handleDualScoreChange(idx, 'acc', 'yes')} className={`flex-1 py-2 text-xs font-bold rounded-lg border transition-all disabled:opacity-30 disabled:cursor-not-allowed ${it.acc === 'yes' ? 'bg-teal-600 text-white border-teal-600 shadow' : 'bg-white text-slate-600 hover:bg-slate-100'}`}>確實</button>
                                                                            <button type="button" disabled={it.comp === 'none' || !it.comp} onClick={() => handleDualScoreChange(idx, 'acc', 'no')} className={`flex-1 py-2 text-xs font-bold rounded-lg border transition-all disabled:opacity-30 disabled:cursor-not-allowed ${it.acc === 'no' ? 'bg-amber-500 text-white border-amber-500 shadow' : 'bg-white text-slate-600 hover:bg-slate-100'}`}>未確實</button>
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                                <input type="text" placeholder="情況紀錄..." value={it.note || ''} onChange={e => {
                                                                    const nl = [...checklist]; nl[idx].note = e.target.value; setChecklist(nl);
                                                                }} className="w-full p-2 text-[11px] bg-slate-50 border-none rounded-lg outline-none" />
                                                            </div>
                                                        ) : (
                                                            // 常規單指標 UI
                                                            <>
                                                                <div className="flex flex-col sm:flex-row justify-between items-start gap-3">
                                                                    <span className="text-sm font-bold text-slate-700 leading-tight flex-1">{idx+1}. {it.name} <span className="text-[10px] text-slate-400 font-normal ml-1">(配分: {it.maxScore}分)</span></span>
                                                                    <div className="flex items-center gap-1 shrink-0 bg-slate-100 p-1 rounded-xl">
                                                                        <button type="button" onClick={() => handleScoreModeChange(idx, 'full', it.maxScore)} className={`px-3 py-1.5 text-[10px] font-bold rounded-lg transition-all ${it.mode === 'full' ? 'bg-green-600 text-white shadow-md' : 'text-slate-500 hover:bg-white'}`}>符合</button>
                                                                        <button type="button" onClick={() => handleScoreModeChange(idx, 'partial', Math.floor(it.maxScore/2))} className={`px-3 py-1.5 text-[10px] font-bold rounded-lg transition-all ${it.mode === 'partial' ? 'bg-amber-500 text-white shadow-md' : 'text-slate-500 hover:bg-white'}`}>部分</button>
                                                                        <button type="button" onClick={() => handleScoreModeChange(idx, 'zero', 0)} className={`px-3 py-1.5 text-[10px] font-bold rounded-lg transition-all ${it.mode === 'zero' ? 'bg-red-600 text-white shadow-md' : 'text-slate-500 hover:bg-white'}`}>不符</button>
                                                                    </div>
                                                                </div>
                                                                {it.mode === 'partial' && (
                                                                    <div className="flex items-center gap-2 bg-amber-50 p-2 rounded-lg border border-amber-100 mt-1">
                                                                        <label className="text-[10px] font-bold text-amber-700">自訂給分：</label>
                                                                        <input type="number" max={it.maxScore} min="0" value={it.score !== null ? it.score : ''} onChange={e => handleScoreValueChange(idx, e.target.value)} className="w-16 p-1 border-b-2 border-amber-400 bg-transparent text-center font-black text-amber-800 outline-none" />
                                                                        <span className="text-[10px] text-amber-600">/ {it.maxScore} 分</span>
                                                                    </div>
                                                                )}
                                                                <input type="text" placeholder="情況紀錄..." value={it.note || ''} onChange={e => {
                                                                    const nl = [...checklist]; nl[idx].note = e.target.value; setChecklist(nl);
                                                                }} className="w-full p-2 text-[11px] bg-slate-50 border-none rounded-lg outline-none" />
                                                            </>
                                                        )}
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                        <textarea placeholder="總結改善與綜合建議..." value={formData.notes || ''} onChange={e => setFormData({...formData, notes: e.target.value})} className="w-full p-3 border border-slate-200 rounded-xl text-sm outline-none focus:border-primary shadow-inner" rows="2"></textarea>
                                        <button type="submit" className="w-full bg-primary text-white py-4 rounded-2xl font-black shadow-xl hover:scale-[1.01] active:scale-95 transition-all text-lg tracking-widest">儲存本次考評紀錄</button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {activeTab === 'history' && (
                            <div className="animate-fade-in bg-white rounded-2xl border shadow-sm flex flex-col overflow-hidden">
                                <div className="p-5 bg-slate-50 border-b flex flex-wrap justify-between items-center gap-4">
                                    <h2 className="font-bold text-slate-700 flex items-center gap-2">📂 歷史歸檔庫</h2>
                                    <div className="flex gap-2">
                                        <label className="bg-blue-600 text-white px-4 py-2 rounded-xl text-xs font-bold flex items-center gap-1.5 shadow-md cursor-pointer hover:bg-blue-700 transition-colors">
                                            <IconImport /> 匯入歷史
                                            <input type="file" accept=".xlsx, .xls" onChange={handleReverseImport} className="hidden" />
                                        </label>
                                        <button onClick={handleBatchDelete} className="bg-red-50 text-red-600 border border-red-200 px-4 py-2 rounded-xl text-xs font-bold flex items-center gap-1.5 shadow-sm hover:bg-red-100 transition-colors"><IconTrash /> 批次刪除</button>
                                        <button onClick={handleExportExcel} className="bg-green-600 text-white px-4 py-2 rounded-xl text-xs font-bold flex items-center gap-1.5 shadow-md hover:bg-green-700 transition-colors"><IconDownload /> 匯出報表</button>
                                    </div>
                                </div>
                                <div className="p-4 flex gap-3 border-b bg-slate-50/30 items-center">
                                    <select value={filterMonth} onChange={e => setFilterMonth(e.target.value)} className="p-2 border rounded-lg text-xs outline-none">{uniqueMonths.map(m => <option key={m} value={m}>{m || '所有月份'}</option>)}<option value="">所有月份</option></select>
                                    <select value={filterItem} onChange={e => setFilterItem(e.target.value)} className="p-2 border rounded-lg text-xs outline-none"><option value="">所有稽核項目</option>{uniqueItems.map(i => <option key={i} value={i}>{i}</option>)}</select>
                                    <span className="text-xs text-slate-400 ml-auto">已選 {selectedIds.size} 筆</span>
                                </div>
                                <div className="overflow-x-auto max-h-[600px] custom-scrollbar">
                                    <table className="w-full text-left text-[11px]">
                                        <thead className="bg-slate-100 text-slate-500 font-bold sticky top-0 z-10 shadow-sm uppercase tracking-wider">
                                            <tr>
                                                <th className="p-4 w-12 text-center"><input type="checkbox" onChange={handleSelectAll} checked={flatFilteredRecords.length > 0 && selectedIds.size >= flatFilteredRecords.length} className="w-4 h-4 cursor-pointer" /></th>
                                                <th className="p-4">日期</th><th className="p-4">受測者</th><th className="p-4">項目</th><th className="p-4 text-center">分數</th><th className="p-4 text-center">操作</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {Object.entries(groupedRecords).map(([month, data]) => {
                                                const allRecs = Object.values(data.items).flat();
                                                const isEx = expandedFolders.has(month);
                                                return (
                                                    <React.Fragment key={month}>
                                                        <tr className="bg-slate-200/80 hover:bg-slate-300 transition-colors cursor-pointer" onClick={() => toggleFolder(month)}>
                                                            <td className="p-3 text-center" onClick={e => e.stopPropagation()}><input type="checkbox" checked={allRecs.every(r => selectedIds.has(r.id))} onChange={(e) => handleToggleFolderSelect(e, allRecs)} className="w-4 h-4 cursor-pointer" /></td>
                                                            <td colSpan="5" className="p-3 font-bold text-slate-700 flex items-center gap-2">
                                                                {isEx ? <IconChevronDown /> : <IconChevronRight />} <IconFolder color="text-blue-600" /> {month} 月份紀錄 ({allRecs.length} 筆)
                                                            </td>
                                                        </tr>
                                                        {isEx && Object.entries(data.items).map(([itemName, recs]) => {
                                                            const itKey = `${month}_${itemName}`;
                                                            const itEx = expandedFolders.has(itKey);
                                                            return (
                                                                <React.Fragment key={itKey}>
                                                                    <tr className="bg-slate-50 hover:bg-slate-100 transition-colors cursor-pointer" onClick={() => toggleFolder(itKey)}>
                                                                        <td colSpan="6" className="p-2 font-bold text-slate-600 flex items-center gap-2 pl-14">
                                                                            {itEx ? <IconChevronDown /> : <IconChevronRight />} <IconFolder color="text-amber-500" /> {itemName} ({recs.length} 筆)
                                                                        </td>
                                                                    </tr>
                                                                    {itEx && recs.map(r => (
                                                                        <tr key={r.id} className={`hover:bg-blue-50/40 transition-colors ${selectedIds.has(r.id) ? 'bg-blue-50/60' : ''}`}>
                                                                            <td className="p-3 text-center"><input type="checkbox" checked={selectedIds.has(r.id)} onChange={() => handleToggleSelect(r.id)} className="w-4 h-4 cursor-pointer" /></td>
                                                                            <td className="p-3 text-slate-500 pl-20">{r.date || '無日期'}</td><td className="p-3 font-black text-primary">{r.target || '未命名'}</td><td className="p-3 text-slate-600 truncate max-w-[150px]">{r.auditName || '未知項目'}</td>
                                                                            <td className="p-3 text-center">
                                                                                {r.isDual ? (
                                                                                    <span className="inline-flex gap-1 text-[10px] font-black"><span className="bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded">遵:{r.score || 0}%</span><span className="bg-teal-100 text-teal-700 px-1.5 py-0.5 rounded">正:{r.score2 || 0}%</span></span>
                                                                                ) : (
                                                                                    <span className={`inline-block px-2 py-1 rounded-full font-black ${Number(r.score) < 80 ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-700'}`}>{r.score || 0}</span>
                                                                                )}
                                                                            </td>
                                                                            <td className="p-3 text-center"><button onClick={() => showConfirm('確定刪除？', () => setRecords(prev => prev.filter(x => x.id !== r.id)))} className="text-red-300 hover:text-red-600 transition-colors"><IconTrash /></button></td>
                                                                        </tr>
                                                                    ))}
                                                                </React.Fragment>
                                                            );
                                                        })}
                                                    </React.Fragment>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {activeTab === 'chart' && (
                            <div className="animate-fade-in space-y-6">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-center">
                                    <div className="bg-white p-8 rounded-3xl border shadow-sm"><p className="text-xs text-slate-400 font-bold uppercase mb-2 tracking-widest">系統總考評量</p><p className="text-5xl font-black text-slate-800">{records.length}</p></div>
                                    <div className="bg-white p-8 rounded-3xl border shadow-sm"><p className="text-xs text-slate-400 font-bold uppercase mb-2 tracking-widest">全體達標率概況</p><p className="text-5xl font-black text-primary">{records.length > 0 ? (records.reduce((a,c)=>a+Number(c?.score || 0),0)/records.length).toFixed(1) : 0}%</p></div>
                                </div>
                                <div className="flex items-center gap-3 bg-white p-4 rounded-xl border shadow-sm flex-wrap">
                                    <label className="font-bold text-slate-700 text-sm">📅 選擇報表年度：</label>
                                    <select value={selectedYear} onChange={e => setSelectedYear(e.target.value)} className="p-2 border border-slate-300 rounded-lg font-bold text-primary outline-none">
                                        {availableYears.map(y => <option key={y} value={y}>{y} 年度</option>)}
                                    </select>
                                    <div className="text-[11px] text-slate-500 ml-auto flex flex-col md:flex-row items-end md:items-center gap-4">
                                        <span className="flex items-center gap-1"><div className="w-3 h-3 bg-slate-200 border"></div> 灰底: 表定監測月份</span>
                                        <span className="flex items-center gap-1 font-bold text-blue-600">雙指標分數顯示為：遵從率/正確率</span>
                                        <button onClick={handleExportChartExcel} className="bg-green-600 text-white px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-1 shadow-sm hover:bg-green-700 transition-colors"><IconDownload /> 匯出分析總表</button>
                                    </div>
                                </div>
                                <ReportTable title="📈 照護品質監測年度管理總表" data={careReportData} onManualScoreChange={handleManualScoreChange} onHideItem={handleHideItem} onRestoreItem={handleRestoreItem} onAnalysisTextChange={handleAnalysisTextChange} onFrequencyChange={handleFrequencyChange} />
                                <ReportTable title="🔧 儀器操作監測年度管理總表" data={equipReportData} onManualScoreChange={handleManualScoreChange} onHideItem={handleHideItem} onRestoreItem={handleRestoreItem} onAnalysisTextChange={handleAnalysisTextChange} onFrequencyChange={handleFrequencyChange} />
                            </div>
                        )}

                        {activeTab === 'manual' && (
                            <div className="animate-fade-in bg-white rounded-3xl border p-8 max-w-4xl mx-auto shadow-sm space-y-8 leading-relaxed">
                                <div className="border-b pb-6 text-center">
                                    <h2 className="text-3xl font-black text-primary flex items-center justify-center gap-3"><IconManual /> 系統操作手冊 <span className="bg-blue-100 text-blue-700 text-sm px-3 py-1 rounded-full">版本：V1.4 防呆自動修復版</span></h2>
                                    <p className="text-slate-500 mt-2 text-sm">歡迎使用清福技術考稽核系統！這是一套專為減輕一線主管行政負擔所設計的無紙化打分系統。請詳閱以下說明以快速上手。</p>
                                </div>
                                <section>
                                    <h3 className="font-bold text-xl text-slate-800 mb-4 bg-blue-50 inline-block px-4 py-2 rounded-lg border-l-4 border-blue-600">📱 雙指標表單 (洗手遵從性) 特別說明</h3>
                                    <div className="space-y-3 text-sm text-slate-600 pl-4 border-l-4 border-blue-200">
                                        <p>✅ <strong>獨立選擇技術與自訂時機：</strong> 選擇「其他」技術時，可完全手動新增洗手時機（從時機一到時機五自由搭配），數量與種類完全由您決定。</p>
                                        <p>✅ <strong>精準報表產出：</strong> 在紀錄庫中勾選洗手紀錄並點擊「匯出報表」時，系統會自動生成符合官方規範的 Excel，包含 A、B、C、D 次數統計與時機 1~5 的總次數。</p>
                                    </div>
                                </section>
                                <section>
                                    <h3 className="font-bold text-xl text-red-800 mb-4 bg-red-50 inline-block px-4 py-2 rounded-lg border border-red-200">⚠️ 系統重大資料安全提醒 (新手必讀)</h3>
                                    <div className="bg-red-50 p-5 rounded-xl border border-red-100 text-sm text-red-700 space-y-3 leading-relaxed">
                                        <p><strong>1. 無雲端自動備份機制：</strong>本系統為「純前端單機版」，所有的考評紀錄、您匯入的新題庫、手填的成績，皆儲存在「您目前使用的這台裝置與瀏覽器中」。</p>
                                        <p><strong>2. 嚴禁清除瀏覽資料：</strong>請絕對不要「清除瀏覽器快取/Cookie」或使用「無痕模式」，否則所有資料將瞬間清空且無法救回！換一台電腦或更換瀏覽器（例如從 Chrome 換到 Edge）也無法看到之前的資料。</p>
                                        <p><strong>3. 養成匯出備份好習慣：</strong>強烈建議稽核人員定期（每週或每月）至「紀錄庫」點擊【匯出報表】，並至「分析報表」點擊【匯出分析總表】，將 Excel 檔案另存至機構的共用資料夾或雲端硬碟作為備份。若未來更換電腦，即可用【匯入歷史】將資料還原。</p>
                                    </div>
                                </section>
                            </div>
                        )}
                    </main>

                    {dialog.isOpen && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-[9999] p-4 animate-fade-in">
                            <div className="bg-white p-6 rounded-2xl shadow-2xl max-w-sm w-full">
                                <h3 className="font-bold text-lg mb-3">{dialog.title}</h3>
                                <p className="text-slate-600 mb-6 text-sm whitespace-pre-line">{dialog.message}</p>
                                <div className="flex justify-end gap-3">
                                    {dialog.type === 'confirm' && <button onClick={() => setDialog({...dialog, isOpen:false})} className="px-5 py-2 bg-slate-100 rounded-xl font-bold text-sm">取消</button>}
                                    <button onClick={() => { if(dialog.onConfirm) dialog.onConfirm(); setDialog({...dialog, isOpen:false}); }} className={`px-5 py-2 rounded-xl font-bold text-sm text-white ${dialog.type === 'confirm' ? 'bg-red-600' : 'bg-primary'}`}>{dialog.type === 'confirm' ? '確定' : '了解'}</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
