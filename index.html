<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>清福技術考稽核系統</title>
    <!-- 引入核心套件 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Mammoth 用於 Word 解析 / SheetJS 用於 Excel 解析與匯出 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: { colors: { primary: '#1e40af', secondary: '#3b82f6' } }
            }
        }
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">
    <div id="root">
        <div class="flex flex-col items-center justify-center min-h-screen text-slate-400">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-primary mb-4"></div>
            系統載入中，請稍候...
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- 本地儲存管理 ---
        const Storage = {
            saveRecords: (data) => localStorage.setItem('audit_records_v6', JSON.stringify(data)),
            getRecords: () => JSON.parse(localStorage.getItem('audit_records_v6') || '[]'),
            saveTemplates: (data) => localStorage.setItem('audit_templates_v6', JSON.stringify(data)),
            getTemplates: () => JSON.parse(localStorage.getItem('audit_templates_v6') || '[]')
        };

        // --- SVG 圖示 ---
        const IconForm = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>;
        const IconHistory = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M12 7v5l4 2"/></svg>;
        const IconChart = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3v18h18"/><rect width="4" height="7" x="7" y="14" rx="1"/><rect width="4" height="12" x="15" y="9" rx="1"/></svg>;
        const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
        const IconDownload = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;
        const IconImport = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 5 17 10"/><line x1="12" y1="5" x2="12" y2="17"/></svg>;

        // --- 主應用程式 ---
        const App = () => {
            const [activeTab, setActiveTab] = useState('form');
            
            // 自訂系統對話框狀態
            const [dialog, setDialog] = useState({ isOpen: false, type: 'alert', title: '', message: '', onConfirm: null });
            const showAlert = (message, title = '系統提示') => setDialog({ isOpen: true, type: 'alert', title, message, onConfirm: null });
            const showConfirm = (message, onConfirm, title = '⚠️ 確認操作') => setDialog({ isOpen: true, type: 'confirm', title, message, onConfirm });
            
            // 讀取資料
            const [records, setRecords] = useState(() => {
                const saved = Storage.getRecords();
                return saved.map(r => r.id ? r : { ...r, id: Date.now().toString() + Math.random().toString(36).substr(2, 5) });
            });
            const [templates, setTemplates] = useState(() => {
                const saved = Storage.getTemplates();
                return saved.map(t => t.id ? t : { ...t, id: Date.now().toString() + Math.random().toString(36).substr(2, 5) });
            });
            
            // 歷史區塊狀態
            const [filterMonth, setFilterMonth] = useState('');
            const [filterItem, setFilterItem] = useState('');
            const [selectedIds, setSelectedIds] = useState(new Set());
            
            // 範本管理狀態
            const [currentTemplateId, setCurrentTemplateId] = useState('');
            const [formData, setFormData] = useState({
                date: new Date().toISOString().split('T')[0],
                auditor: '', unit: '', target: '', score: '', notes: '', auditName: '一般綜合稽核'
            });
            const [checklist, setChecklist] = useState([]);
            const [isUploading, setIsUploading] = useState(false);

            useEffect(() => Storage.saveRecords(records), [records]);
            useEffect(() => Storage.saveTemplates(templates), [templates]);

            // 自動計分
            useEffect(() => {
                if (checklist.length > 0) {
                    const valid = checklist.filter(i => i.score >= 0);
                    if (valid.length > 0) {
                        const max = valid.reduce((a, c) => a + c.maxScore, 0);
                        const cur = valid.reduce((a, c) => a + c.score, 0);
                        setFormData(p => ({ ...p, score: max > 0 ? Math.round((cur/max)*100) : 0 }));
                    }
                }
            }, [checklist]);

            // --- 檔案與範本處理 ---
            const parseRowToItem = (cells) => {
                if (cells.length < 2) return null;
                const rowText = cells.join('');
                if (rowText.includes('評核項目') || rowText.includes('總分')) return null;
                
                let maxScore = 100, scoreIndex = -1;
                for(let i=0; i<cells.length; i++) {
                    const cellVal = String(cells[i]).trim();
                    const m = cellVal.match(/^(\d+)(分)?$/);
                    if (m && Number(m[1]) <= 100 && Number(m[1]) > 0) {
                        maxScore = Number(m[1]);
                        scoreIndex = i;
                        break;
                    }
                }
                if (scoreIndex === -1) return null;
                const name = cells.slice(0, scoreIndex).filter(c => c && String(c).trim()).join(' - ');
                const criteria = cells.slice(scoreIndex + 1).filter(c => c && String(c).trim()).join(' ');
                if (!name) return null;
                return { id: Math.random().toString(36).substr(2, 9), name, maxScore, criteria, score: maxScore, note: '' };
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setIsUploading(true);
                const fileExt = file.name.split('.').pop().toLowerCase();
                const fileNameWithoutExt = file.name.replace(/\.[^/.]+$/, "");
                const reader = new FileReader();

                reader.onload = async (ev) => {
                    const arrayBuffer = ev.target.result;
                    let items = [];

                    if (fileExt === 'docx') {
                        try {
                            const result = await window.mammoth.convertToHtml({ arrayBuffer });
                            const doc = new DOMParser().parseFromString(result.value, 'text/html');
                            doc.querySelectorAll('tr').forEach(tr => {
                                const cells = Array.from(tr.querySelectorAll('td, th')).map(c => c.textContent.trim());
                                const item = parseRowToItem(cells);
                                if (item) items.push(item);
                            });
                        } catch (err) { showAlert('Word 解析失敗', '⚠️ 解析錯誤'); }
                    } else if (fileExt === 'xlsx' || fileExt === 'xls') {
                        try {
                            const wb = window.XLSX.read(new Uint8Array(arrayBuffer), { type: 'array' });
                            const rows = window.XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1, raw: false, defval: '' });
                            rows.forEach(row => {
                                const item = parseRowToItem(row.map(c => String(c || '')));
                                if (item) items.push(item);
                            });
                        } catch (err) { showAlert('Excel 解析失敗', '⚠️ 解析錯誤'); }
                    }

                    if (items.length > 0) {
                        const newTplId = Date.now().toString() + Math.random().toString(36).substr(2, 5);
                        setTemplates(prev => [...prev, { id: newTplId, name: fileNameWithoutExt, items }]);
                        setChecklist(items);
                        setCurrentTemplateId(newTplId);
                        setFormData(p => ({ ...p, auditName: fileNameWithoutExt }));
                        showAlert('✅ 範本解析成功！已加入題庫。', '上傳成功');
                    } else {
                        showAlert('⚠️ 未能辨識出評分項目。請確認檔案中有包含「配分數字」。', '格式錯誤');
                    }
                    setIsUploading(false);
                    e.target.value = '';
                };
                reader.readAsArrayBuffer(file);
            };

            const handleDeleteTemplate = () => {
                const currentTpl = templates.find(t => String(t.id) === String(currentTemplateId));
                if (currentTpl) {
                    showConfirm(`確定要從題庫中刪除「${currentTpl.name}」這個範本嗎？此操作無法復原。`, () => {
                        setTemplates(prev => prev.filter(t => String(t.id) !== String(currentTemplateId)));
                        setCurrentTemplateId('');
                        setFormData(p => ({ ...p, auditName: '一般綜合稽核' }));
                        setChecklist([]);
                    });
                }
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!formData.target) return showAlert('請輸入受測對象姓名！', '⚠️ 欄位未填');
                const newRec = { ...formData, id: Date.now().toString() + Math.random().toString(36).substr(2, 5), checklist };
                setRecords(prev => [newRec, ...prev]);
                setFormData(p => ({ ...p, target: '', score: '', notes: '' }));
                setChecklist(checklist.map(i => ({ ...i, score: i.maxScore, note: '' })));
                showAlert('💾 紀錄已儲存！', '儲存成功');
            };

            // --- 強化：智慧日期格式化引擎 ---
            // 解決 Excel 讀取時產生的「2024/4/24」、「45398」等格式錯亂問題，統一轉換為 YYYY-MM-DD
            const formatExcelDate = (raw) => {
                const rawStr = String(raw || '').trim();
                if (!rawStr) return new Date().toISOString().split('T')[0];

                // 處理 YYYY/M/D 或 YYYY-M-D 的情況
                if (/^\d{1,4}[-/]\d{1,2}[-/]\d{1,4}$/.test(rawStr)) {
                    const parts = rawStr.split(/[-/]/);
                    let y = parts[0], m = parts[1], d = parts[2];
                    
                    // 如果年份在後面 (例如 M/D/YYYY)
                    if (d.length === 4) {
                        y = parts[2]; m = parts[0]; d = parts[1];
                    }
                    
                    // 補零
                    m = m.padStart(2, '0');
                    d = d.padStart(2, '0');
                    return `${y}-${m}-${d}`;
                }

                // 處理其他文字格式 (只取前10碼，例如 2024-04-24T10:00:00)
                const safeDate = rawStr.replace(/\//g, '-').substring(0, 10);
                if (safeDate.length === 10 && /^\d{4}-\d{2}-\d{2}$/.test(safeDate)) {
                    return safeDate;
                }

                // 無法辨識的格式，退回今日日期以防系統崩潰
                return new Date().toISOString().split('T')[0];
            };

            const handleReverseImport = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const wb = window.XLSX.read(new Uint8Array(ev.target.result), { type: 'array' });
                        // 加入 dateNF 強制格式轉換
                        const data = window.XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { raw: false, dateNF: 'yyyy-mm-dd', defval: '' });
                        
                        const imported = data.map((row, index) => {
                            const rawDate = row['稽核日期'] || row['日期'] || '';
                            const fmtDate = formatExcelDate(rawDate);

                            return {
                                id: Date.now().toString() + index + Math.random().toString(36).substr(2, 5),
                                date: fmtDate,
                                auditName: String(row['稽核項目'] || row['項目'] || '匯入紀錄'),
                                unit: String(row['受稽單位'] || row['單位'] || ''),
                                target: String(row['受測對象(姓名)'] || row['受測對象'] || row['姓名'] || ''),
                                auditor: String(row['稽核人員'] || row['稽核員'] || ''),
                                score: Number(row['總評分'] || row['分數'] || 0),
                                notes: String(row['總結建議'] || ''),
                                checklist: [] 
                            };
                        });
                        setRecords(prev => [...imported, ...prev]);
                        showAlert(`✅ 成功匯入 ${imported.length} 筆歷史紀錄！\n日期格式已自動校正。`, '匯入成功');
                    } catch (err) { showAlert('匯入失敗，請確認 Excel 格式。', '⚠️ 匯入錯誤'); }
                    e.target.value = '';
                };
                reader.readAsArrayBuffer(file);
            };

            // --- 歷史紀錄管理 ---
            const uniqueMonths = useMemo(() => [...new Set(records.map(r => String(r.date || '').substring(0, 7)))].sort().reverse(), [records]);
            const uniqueItems = useMemo(() => [...new Set(records.map(r => String(r.auditName || '')))].sort(), [records]);

            const filteredRecords = useMemo(() => {
                return records.filter(r => {
                    const matchM = filterMonth ? String(r.date || '').startsWith(filterMonth) : true;
                    const matchI = filterItem ? String(r.auditName || '') === filterItem : true;
                    return matchM && matchI;
                });
            }, [records, filterMonth, filterItem]);

            const handleSelectAll = (e) => {
                if (e.target.checked) setSelectedIds(new Set(filteredRecords.map(r => r.id)));
                else setSelectedIds(new Set());
            };

            const handleSelectOne = (id) => {
                setSelectedIds(prev => {
                    const next = new Set(prev);
                    if (next.has(id)) next.delete(id); else next.add(id);
                    return next;
                });
            };

            // 單筆刪除
            const handleDeleteRecord = (id) => {
                showConfirm('確定要永久刪除此筆紀錄嗎？此操作無法復原。', () => {
                    setRecords(prev => prev.filter(x => String(x.id) !== String(id)));
                    setSelectedIds(prev => { const next = new Set(prev); next.delete(id); return next; });
                });
            };

            // 新增：批次刪除
            const handleBatchDelete = () => {
                if (selectedIds.size === 0) return;
                showConfirm(`確定要永久刪除這 ${selectedIds.size} 筆紀錄嗎？此操作無法復原。`, () => {
                    setRecords(prev => prev.filter(x => !selectedIds.has(x.id)));
                    setSelectedIds(new Set()); // 清空已選取
                });
            };

            const handleExportExcel = () => {
                const targets = selectedIds.size > 0 
                    ? records.filter(r => selectedIds.has(r.id)) 
                    : filteredRecords;

                if (targets.length === 0) return showAlert('沒有資料可匯出！', '⚠️ 匯出錯誤');

                const data = targets.map(r => {
                    const row = { 
                        '稽核日期': r.date, 
                        '稽核項目': r.auditName, 
                        '受稽單位': r.unit, 
                        '受測對象(姓名)': r.target, 
                        '稽核人員': r.auditor, 
                        '總評分': r.score 
                    };
                    (r.checklist || []).forEach((it, idx) => {
                        row[`項${idx+1}_${it.name}`] = it.score;
                        if (it.note) row[`項${idx+1}_備註`] = it.note;
                    });
                    row['總結建議'] = r.notes;
                    row['受測者簽名確認'] = '';
                    return row;
                });
                
                // 新增：如果匯出人數大於 1，就在資料底部新增一列「平均總分」
                const hasMultiple = targets.length > 1;
                if (hasMultiple) {
                    data.push({
                        '稽核日期': '',
                        '稽核項目': '',
                        '受稽單位': '',
                        '受測對象(姓名)': '',
                        '稽核人員': '平均總分',
                        '總評分': '' // 將由下方的 Excel 函數動態計算
                    });
                }

                const ws = window.XLSX.utils.json_to_sheet(data);
                
                // ===== 寫入 Excel 函數 =====
                const range = window.XLSX.utils.decode_range(ws['!ref']);
                for (let R = 1; R <= range.e.r; ++R) {
                    if (hasMultiple && R === range.e.r) {
                        // 處理最後一列「平均總分」的 AVERAGE 函數
                        const cell_ref = window.XLSX.utils.encode_cell({c: 5, r: R}); // 總評分在 F 欄 (索引 5)
                        const start_avg = window.XLSX.utils.encode_cell({c: 5, r: 1}); // 從 F2 開始 (0 是標題列)
                        const end_avg = window.XLSX.utils.encode_cell({c: 5, r: R - 1}); // 到 F 的上一列
                        
                        if (!ws[cell_ref]) ws[cell_ref] = { t: 'n', v: 0 };
                        ws[cell_ref].t = 'n';
                        ws[cell_ref].f = `AVERAGE(${start_avg}:${end_avg})`; // 寫入 Excel 的 AVERAGE 公式
                    } else {
                        // 一般考評資料列：確保有足夠的欄位才寫入 SUM 函數
                        if (range.e.c >= 6) {
                            const cell_ref = window.XLSX.utils.encode_cell({c: 5, r: R}); 
                            const start_cell = window.XLSX.utils.encode_cell({c: 6, r: R}); // 項目從 G 欄 (索引 6) 開始
                            const end_cell = window.XLSX.utils.encode_cell({c: Math.max(6, range.e.c - 2), r: R}); // 扣除最後的「總結」與「簽名」
                            
                            if (ws[cell_ref]) {
                                ws[cell_ref].t = 'n'; // 強制設為數字類型
                                ws[cell_ref].f = `SUM(${start_cell}:${end_cell})`; // 寫入 Excel 的 SUM 公式
                            }
                        }
                    }
                }
                // ==========================================

                const wb = window.XLSX.utils.book_new();
                window.XLSX.utils.book_append_sheet(wb, ws, "稽核紀錄表");
                
                const monthLabel = filterMonth || '全部月份';
                const itemLabel = filterItem || '全部項目';
                window.XLSX.writeFile(wb, `稽核統計表_${monthLabel}_${itemLabel}.xlsx`);
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <nav className="bg-primary text-white p-4 shadow-lg sticky top-0 z-50 flex justify-between items-center">
                        <div className="flex flex-col">
                            <h1 className="font-bold text-lg tracking-tight">清福技術考稽核系統</h1>
                            <span className="text-[9px] bg-white/20 px-2 py-0.5 rounded self-start uppercase">Stable V6.4</span>
                        </div>
                    </nav>

                    <main className="max-w-4xl mx-auto w-full p-4 flex-1">
                        {/* 分頁按鈕 */}
                        <div className="flex gap-1 mb-6 bg-white p-1 rounded-xl shadow-sm border border-slate-200">
                            <button onClick={() => setActiveTab('form')} className={`flex-1 py-3 rounded-lg font-bold flex items-center justify-center gap-2 transition-all ${activeTab === 'form' ? 'bg-primary text-white shadow-lg' : 'text-slate-400'}`}><IconForm /> 現場考評</button>
                            <button onClick={() => setActiveTab('history')} className={`flex-1 py-3 rounded-lg font-bold flex items-center justify-center gap-2 transition-all ${activeTab === 'history' ? 'bg-primary text-white shadow-lg' : 'text-slate-400'}`}><IconHistory /> 紀錄庫</button>
                            <button onClick={() => setActiveTab('chart')} className={`flex-1 py-3 rounded-lg font-bold flex items-center justify-center gap-2 transition-all ${activeTab === 'chart' ? 'bg-primary text-white shadow-lg' : 'text-slate-400'}`}><IconChart /> 分析報表</button>
                        </div>

                        {activeTab === 'form' && (
                            <div className="space-y-6 animate-fade-in">
                                <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                                        <div className="bg-blue-50 p-4 rounded-lg">
                                            <label className="block text-[10px] font-bold text-slate-500 mb-2 uppercase tracking-wider">選擇稽核標準範本</label>
                                            <div className="flex gap-2">
                                                <select value={currentTemplateId} onChange={e => {
                                                    const selectedId = e.target.value;
                                                    setCurrentTemplateId(selectedId);
                                                    const t = templates.find(x => x.id === selectedId);
                                                    if (t) { setChecklist(t.items.map(i => ({...i, score: i.maxScore, note: ''}))); setFormData({...formData, auditName: t.name}); }
                                                    else { setChecklist([]); setFormData({...formData, auditName: '一般綜合稽核'}); }
                                                }} className="flex-1 p-2.5 border rounded-lg bg-white outline-none font-medium shadow-sm">
                                                    <option value="">-- 手動 / 選擇題庫 --</option>
                                                    {templates.map(t => <option key={t.id} value={t.id}>{t.name} ({t.items.length}項)</option>)}
                                                </select>
                                                {currentTemplateId && templates.some(t => t.id === currentTemplateId) && (
                                                    <button type="button" onClick={handleDeleteTemplate} className="bg-red-100 text-red-600 px-3 rounded-lg hover:bg-red-200 transition-colors shadow-sm" title="刪除此範本">
                                                        <IconTrash />
                                                    </button>
                                                )}
                                            </div>
                                        </div>
                                        <div className="border-2 border-dashed border-slate-300 rounded-lg p-4 flex flex-col items-center justify-center text-center bg-slate-50/50">
                                            <input type="file" id="up-tpl" className="hidden" onChange={handleFileUpload} accept=".docx, .xlsx, .xls" />
                                            <label htmlFor="up-tpl" className={`cursor-pointer bg-white border border-slate-300 px-6 py-2 rounded-lg text-sm font-bold shadow-sm hover:bg-slate-50 transition-colors ${isUploading ? 'opacity-50 pointer-events-none' : ''}`}>
                                                {isUploading ? '解析中...' : '匯入 Word / Excel 範本'}
                                            </label>
                                            <p className="text-[10px] text-slate-400 mt-2">支援 Word (.docx) 直接轉換考評項目</p>
                                        </div>
                                    </div>

                                    <form onSubmit={handleSubmit} className="space-y-4">
                                        <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
                                            <div><label className="text-[10px] font-bold text-slate-400">稽核日期</label><input type="date" value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} className="w-full p-2 border rounded text-sm" /></div>
                                            <div><label className="text-[10px] font-bold text-slate-400">稽核人員</label><input type="text" placeholder="姓名" value={formData.auditor} onChange={e => setFormData({...formData, auditor: e.target.value})} className="w-full p-2 border rounded text-sm" /></div>
                                            <div><label className="text-[10px] font-bold text-slate-400">受稽單位</label><input type="text" placeholder="單位" value={formData.unit} onChange={e => setFormData({...formData, unit: e.target.value})} className="w-full p-2 border rounded text-sm" /></div>
                                            <div><label className="text-[10px] font-bold text-slate-400">受測對象(姓名)</label><input type="text" placeholder="姓名" value={formData.target} onChange={e => setFormData({...formData, target: e.target.value})} className="w-full p-2 border-2 border-primary rounded text-sm font-bold text-primary" /></div>
                                            <div><label className="text-[10px] font-bold text-slate-400">總評分</label><input type="text" readOnly value={formData.score} className="w-full p-2 bg-slate-100 rounded text-sm font-black text-primary text-center" /></div>
                                        </div>

                                        {checklist.length > 0 && (
                                            <div className="mt-4 space-y-3 max-h-[450px] overflow-y-auto pr-2 custom-scrollbar">
                                                {checklist.map((it, idx) => (
                                                    <div key={idx} className="bg-slate-50 p-4 rounded-xl border flex flex-col gap-3 shadow-sm border-slate-200">
                                                        <div className="flex justify-between items-start gap-2">
                                                            <span className="text-sm font-bold text-slate-700 leading-tight">{idx+1}. {it.name}</span>
                                                            <div className="flex gap-1 shrink-0">
                                                                <button type="button" onClick={() => { const nl = [...checklist]; nl[idx].score = it.maxScore; setChecklist(nl); }} className={`px-3 py-1.5 text-[10px] font-bold border rounded-lg transition-colors ${it.score === it.maxScore ? 'bg-green-600 text-white border-green-600' : 'bg-white text-slate-400 border-slate-200'}`}>符合</button>
                                                                <button type="button" onClick={() => { const nl = [...checklist]; nl[idx].score = 0; setChecklist(nl); }} className={`px-3 py-1.5 text-[10px] font-bold border rounded-lg transition-colors ${it.score === 0 ? 'bg-red-600 text-white border-red-600' : 'bg-white text-slate-400 border-slate-200'}`}>不符</button>
                                                                <input type="number" max={it.maxScore} min="0" value={it.score} onChange={e => { const nl = [...checklist]; nl[idx].score = parseInt(e.target.value) || 0; setChecklist(nl); }} className="w-12 text-center border rounded-lg text-xs font-bold border-slate-300" />
                                                            </div>
                                                        </div>
                                                        {it.criteria && <p className="text-[11px] text-slate-400 italic">標準：{it.criteria}</p>}
                                                        <input type="text" placeholder="單項詳細紀錄..." value={it.note} onChange={e => { const nl = [...checklist]; nl[idx].note = e.target.value; setChecklist(nl); }} className="w-full p-2 text-[11px] bg-white border border-slate-100 rounded-lg outline-none focus:border-primary transition-colors" />
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                        <textarea placeholder="總結改善與綜合建議..." value={formData.notes} onChange={e => setFormData({...formData, notes: e.target.value})} className="w-full p-4 border border-slate-200 rounded-2xl text-sm outline-none focus:border-primary transition-colors shadow-inner" rows="2"></textarea>
                                        <button type="submit" className="w-full bg-primary text-white py-4 rounded-2xl font-black shadow-xl hover:scale-[1.01] active:scale-95 transition-all uppercase tracking-widest">儲存本次考評紀錄</button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {activeTab === 'history' && (
                            <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden animate-fade-in">
                                <div className="p-5 bg-slate-50 border-b border-slate-200 flex flex-col gap-4">
                                    <div className="flex flex-wrap justify-between items-center gap-4">
                                        <h2 className="font-bold text-slate-700">歷史紀錄歸檔庫</h2>
                                        <div className="flex gap-2">
                                            {/* 新增：刪除勾選項目的按鈕，只有在有勾選時才會出現 */}
                                            {selectedIds.size > 0 && (
                                                <button type="button" onClick={handleBatchDelete} className="bg-red-600 text-white px-4 py-2 rounded-xl text-[11px] font-bold flex items-center gap-1.5 shadow-md hover:bg-red-700 transition-colors mr-2">
                                                    <IconTrash /> 刪除勾選 ({selectedIds.size})
                                                </button>
                                            )}
                                            
                                            <input type="file" id="re-import" className="hidden" onChange={handleReverseImport} accept=".xlsx, .xls" />
                                            <label htmlFor="re-import" className="cursor-pointer bg-blue-600 text-white px-4 py-2 rounded-xl text-[11px] font-bold flex items-center gap-1.5 shadow-md hover:bg-blue-700 transition-colors"><IconImport /> 匯入報表</label>
                                            <button type="button" onClick={handleExportExcel} className="bg-green-600 text-white px-4 py-2 rounded-xl text-[11px] font-bold flex items-center gap-1.5 shadow-md hover:bg-green-700 transition-colors"><IconDownload /> 匯出勾選/篩選表</button>
                                        </div>
                                    </div>
                                    
                                    {/* 篩選列 */}
                                    <div className="flex flex-wrap gap-3 items-center">
                                        <select value={filterMonth} onChange={e => setFilterMonth(e.target.value)} className="p-2 border border-slate-300 rounded-lg text-xs bg-white outline-none text-slate-600 font-medium">
                                            <option value="">-- 全部月份 --</option>
                                            {uniqueMonths.map(m => <option key={m} value={m}>{m}</option>)}
                                        </select>
                                        <select value={filterItem} onChange={e => setFilterItem(e.target.value)} className="p-2 border border-slate-300 rounded-lg text-xs bg-white outline-none max-w-[200px] text-slate-600 font-medium">
                                            <option value="">-- 全部技術項目 --</option>
                                            {uniqueItems.map(i => <option key={i} value={i}>{i}</option>)}
                                        </select>
                                    </div>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left text-[11px]">
                                        <thead className="bg-slate-100 text-slate-500 font-bold uppercase tracking-wider">
                                            <tr>
                                                <th className="p-4 w-12 text-center">
                                                    <input type="checkbox" onChange={handleSelectAll} checked={filteredRecords.length > 0 && selectedIds.size === filteredRecords.length} className="cursor-pointer w-4 h-4 rounded border-gray-300 text-primary focus:ring-primary" />
                                                </th>
                                                <th className="p-4">日期</th>
                                                <th className="p-4">受測對象</th>
                                                <th className="p-4">稽核項目</th>
                                                <th className="p-4 text-center">分數</th>
                                                <th className="p-4 text-center">操作</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {filteredRecords.length === 0 ? (
                                                <tr><td colSpan="6" className="p-10 text-center text-slate-400">目前尚無符合的考評紀錄</td></tr>
                                            ) : (
                                                filteredRecords.map(r => (
                                                    <tr key={r.id} className={`transition-colors ${selectedIds.has(r.id) ? 'bg-blue-50/50' : 'hover:bg-slate-50'}`}>
                                                        <td className="p-4 text-center">
                                                            <input type="checkbox" checked={selectedIds.has(r.id)} onChange={() => handleSelectOne(r.id)} className="cursor-pointer w-4 h-4 rounded border-gray-300 text-primary focus:ring-primary" />
                                                        </td>
                                                        <td className="p-4 whitespace-nowrap text-slate-500 font-medium">{r.date}</td>
                                                        <td className="p-4 font-black text-primary">{r.target}</td>
                                                        <td className="p-4 text-slate-600 font-medium max-w-[150px] truncate" title={r.auditName}>{r.auditName}</td>
                                                        <td className="p-4 text-center"><span className={`inline-block w-8 py-1 rounded-full font-black ${r.score < 80 ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-700'}`}>{r.score}</span></td>
                                                        <td className="p-4 text-center">
                                                            <button type="button" onClick={() => handleDeleteRecord(r.id)} className="text-red-300 hover:text-red-500 transition-colors p-1"><IconTrash /></button>
                                                        </td>
                                                    </tr>
                                                ))
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {activeTab === 'chart' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 animate-fade-in text-center">
                                <div className="bg-white p-10 rounded-3xl border border-slate-200 shadow-sm">
                                    <p className="text-xs text-slate-400 font-bold uppercase mb-2 tracking-widest">總考評件數</p>
                                    <p className="text-6xl font-black text-slate-800">{records.length}</p>
                                </div>
                                <div className="bg-white p-10 rounded-3xl border border-slate-200 shadow-sm">
                                    <p className="text-xs text-slate-400 font-bold uppercase mb-2 tracking-widest">全年度平均成績</p>
                                    <p className="text-6xl font-black text-primary">
                                        {records.length > 0 ? (records.reduce((a,c)=>a+Number(c.score || 0),0)/records.length).toFixed(1) : 0}
                                    </p>
                                </div>
                                <div className="md:col-span-2 bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                                    <h3 className="font-bold text-slate-700 mb-4 border-b pb-2 text-left">每月績效趨勢</h3>
                                    <div className="space-y-3">
                                        {Object.entries(records.reduce((acc, r) => {
                                            const m = String(r.date || '').substring(0, 7);
                                            if(!acc[m]) acc[m] = {s:0, c:0};
                                            acc[m].s += Number(r.score || 0); acc[m].c += 1;
                                            return acc;
                                        }, {})).sort((a,b) => b[0].localeCompare(a[0])).map(([month, data]) => (
                                            <div key={month} className="flex justify-between items-center bg-slate-50 p-3 rounded-xl">
                                                <span className="font-bold text-slate-600">{month || '無日期'}</span>
                                                <div className="flex gap-6 items-center">
                                                    <span className="text-xs text-slate-400">{data.c} 筆紀錄</span>
                                                    <span className={`text-sm font-black ${(data.s/data.c) < 80 ? 'text-red-500' : 'text-green-600'}`}>{(data.s/data.c).toFixed(1)} 分</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* 自訂對話框 Modal */}
                    {dialog.isOpen && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-[9999] p-4 animate-fade-in">
                            <div className="bg-white p-6 rounded-2xl shadow-2xl max-w-sm w-full border border-slate-100">
                                <h3 className="font-bold text-lg mb-3 text-slate-800">{dialog.title}</h3>
                                <p className="text-slate-600 mb-6 text-sm leading-relaxed">{dialog.message}</p>
                                <div className="flex justify-end gap-3">
                                    {dialog.type === 'confirm' && (
                                        <button onClick={() => setDialog({ ...dialog, isOpen: false })} className="px-5 py-2.5 bg-slate-100 text-slate-600 rounded-xl font-bold hover:bg-slate-200 transition-colors text-sm">取消</button>
                                    )}
                                    <button onClick={() => {
                                        if (dialog.type === 'confirm' && dialog.onConfirm) dialog.onConfirm();
                                        setDialog({ ...dialog, isOpen: false });
                                    }} className={`px-5 py-2.5 rounded-xl font-bold transition-colors text-sm ${dialog.type === 'confirm' ? 'bg-red-600 text-white hover:bg-red-700 shadow-lg shadow-red-600/30' : 'bg-primary text-white hover:bg-blue-800 shadow-lg shadow-primary/30'}`}>
                                        {dialog.type === 'confirm' ? '確定刪除' : '我知道了'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="p-8 text-center text-slate-300 text-[10px] font-medium tracking-widest uppercase">
                        &copy; 2026 Smart Audit System for Nursing Care | Cleen-Fu Edition
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
